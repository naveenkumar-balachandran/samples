apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iframefullserver
  namespace: boldbi-embed
  annotations:
    # For NGINX Ingress Controller
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    # Optional: Use cert-manager for automatic TLS
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    
    # For Application Gateway Ingress Controller (AGIC), use instead:
    # kubernetes.io/ingress.class: azure/application-gateway
    # appgw.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        # UPDATE THIS: Your public hostname (e.g., embed.yourdomain.com)
        - embed.example.com
      # UPDATE THIS: Your TLS certificate secret name
      secretName: iframefullserver-tls
  rules:
    - host: embed.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iframefullserver
                port:
                  number: 80
